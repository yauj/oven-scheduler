name: Trigger oven preheat

# Fires up to 5 times, 15 minutes apart, across the 1:00-2:00 AM Pacific
# trigger window (Monday-Thursday). scripts/trigger_oven.py checks the real
# time against America/Los_Angeles and no-ops outside that window; the
# first tick that lands inside it arms the oven, and the no-clobber guard
# in trigger_oven.py makes any later tick in the same window a harmless
# no-op. This exists because GitHub's cron is best-effort and can run late
# by more than a few minutes, so a single-shot trigger can get skipped
# entirely — see the incident on 2026-07-20 where the only scheduled run
# fired at 3:36 AM, outside the (much narrower) window that existed then.
#
# NOT DST-safe: 8:00-8:59 UTC = 1:00-1:59 AM Pacific only while PDT (UTC-7)
# is in effect. Shift the cron hour and TRIGGER_START/END_HOUR below by 1
# (to 9 UTC / 2-3 AM Pacific) for PST (UTC-8), or accept the trigger window
# drifting by an hour until the next edit.
on:
  schedule:
    - cron: "0,15,30,45,59 8 * * 1-4"
  workflow_dispatch:
    inputs:
      force:
        description: "Skip the time-window check and fire immediately (manual testing)"
        type: boolean
        default: false
      target_temp:
        description: "Override TARGET_TEMP (Fahrenheit) for this manual run"
        type: string
        default: ""
      target_start_hour:
        description: "Override TARGET_START_HOUR (24h Pacific) for this manual run"
        type: string
        default: ""
      target_start_minute:
        description: "Override TARGET_START_MINUTE for this manual run"
        type: string
        default: ""

env:
  # Schedule config, in one place so it's easy to change without touching
  # trigger_oven.py. See scripts/trigger_oven.py for what each var does.
  TARGET_TEMP: "450"
  TARGET_START_HOUR: "6"
  TARGET_START_MINUTE: "0"
  # Must line up with the cron schedule above (currently 8:00-8:59 UTC =
  # 1:00-1:59 AM Pacific during PDT).
  TRIGGER_START_HOUR: "1"
  TRIGGER_START_MINUTE: "0"
  TRIGGER_END_HOUR: "2"
  TRIGGER_END_MINUTE: "0"

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Trigger oven start script
        env:
          SMARTHQ_USERNAME: ${{ secrets.SMARTHQ_USERNAME }}
          SMARTHQ_REFRESH_TOKEN: ${{ secrets.SMARTHQ_REFRESH_TOKEN }}
          OVEN_MAC: ${{ secrets.OVEN_MAC }}
          FORCE: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '1' || '0' }}
          TARGET_TEMP: ${{ (github.event_name == 'workflow_dispatch' && inputs.target_temp != '' && inputs.target_temp) || env.TARGET_TEMP }}
          TARGET_START_HOUR: ${{ (github.event_name == 'workflow_dispatch' && inputs.target_start_hour != '' && inputs.target_start_hour) || env.TARGET_START_HOUR }}
          TARGET_START_MINUTE: ${{ (github.event_name == 'workflow_dispatch' && inputs.target_start_minute != '' && inputs.target_start_minute) || env.TARGET_START_MINUTE }}
          TRIGGER_START_HOUR: ${{ env.TRIGGER_START_HOUR }}
          TRIGGER_START_MINUTE: ${{ env.TRIGGER_START_MINUTE }}
          TRIGGER_END_HOUR: ${{ env.TRIGGER_END_HOUR }}
          TRIGGER_END_MINUTE: ${{ env.TRIGGER_END_MINUTE }}
        run: python scripts/trigger_oven.py

      - name: Notify on failure
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -n "$NTFY_TOPIC" ]; then
            curl -s -H "Title: Oven trigger failed" \
                 -d "The scheduled oven preheat trigger failed. Check the GitHub Actions log." \
                 "https://ntfy.sh/$NTFY_TOPIC" || true
          else
            echo "NTFY_TOPIC secret not set — skipping push notification. Relying on GitHub's default failure email."
          fi
